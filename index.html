<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./app/reset.css">
    <link rel="stylesheet" href="./app/style.css">

    <script defer src="./app/script.js"></script>

    <title>Frontened Quiz</title>
</head>
<body>

    <header class="main-header">
        <div class="theme-toggle-container">

            <div class="icon-toggle--container icon-sun--container">
                <img class="icon-toggle icon-sun icon-sun--dark" src="./app/assets/images/icon-sun-dark.svg" alt="icon-sun">
                <img class="icon-toggle icon-sun icon-sun--light display-none" src="./app/assets/images/icon-sun-light.svg" alt="icon-sun">
            </div>

            <button class="btn-theme-toggle">
                <div class="toggle-circle"></div>
            </button>

            <div class="icon-toggle--container icon-moon--container">
                <img class="icon-toggle icon-moon icon-moon--dark" src="./app/assets/images/icon-moon-dark.svg" alt="icon-moon">
                <img class="icon-toggle icon-moon icon-moon--dark display-none" src="./app/assets/images/icon-moon-light.svg" alt="icon-moon">
            </div>
        </div>
    </header>

    <main class="main-section">
        <section class="section section--start-menu display-none">

            <header>
                <h1>
                    Welcom To The
                    <b>Frontened Quiz!</b>
                </h1>
                <p class="sub-h">Pick a subject to get started.</p>
            </header>

            <ul class="quiz-topics-list">
                <li class="quiz-topic">
                    <figure class="quiz-topic--icon quiz-topic--icon-html">
                        <img src="./app/assets/images/icon-html.svg" alt="icon-html">
                    </figure>
                    <figcaption class="quiz-topic--name">HTML</figcaption>
                </li>

                <li class="quiz-topic">
                    <figure class="quiz-topic--icon quiz-topic--icon-css">
                        <img src="./app/assets/images/icon-css.svg" alt="icon-css">
                    </figure>
                    <figcaption class="quiz-topic--name">CSS</figcaption>
                </li>

                <li class="quiz-topic">
                    <figure class="quiz-topic--icon quiz-topic--icon-js">
                        <img src="./app/assets/images/icon-js.svg" alt="icon-javascript">
                    </figure>
                    <figcaption class="quiz-topic--name">Javascript</figcaption>
                </li>

                <li class="quiz-topic">
                    <figure class="quiz-topic--icon quiz-topic--icon-accessibility">
                        <img src="./app/assets/images/icon-accessibility.svg" alt="icon-accessibility">
                    </figure>
                    <figcaption class="quiz-topic--name">Accessibility</figcaption>
                </li>
            </ul>

        </section>

        <section class="section section--question">

            <header>
                <label for="quiz-progress" class="question-counter">
                    Question <span class="current-index">6</span> of <span class="total-count">10</span>
                </label>

                <h2 class="question">
                    Which of these color contrast ratios defines the minimum WCAG 2.1 
                    Level AA requirement for normal text?
                </h2>

                <progress id="quiz-progress" value="6" max="10"></progress>
            </header>

            <form class="form--answers">
                <fieldset>
                    <ul class="answers-list">
                        <li class="answer-container">
                            <input type="radio" id="answer-1" name="quiz" class="inp-checkbox">
                            <label for="answer-1">4.5 : 1</label>
                        </li>

                        <li class="answer-container">
                            <input type="radio" id="answer-2" name="quiz" class="inp-checkbox">
                            <label for="answer-2">3 : 1 </label>
                        </li>

                        <li class="answer-container">
                            <input type="radio" id="answer-3" name="quiz" class="inp-checkbox">
                            <label for="answer-3">2.5 : 1</label>
                        </li>

                        <li class="answer-container">
                            <input type="radio" id="answer-4" name="quiz" class="inp-checkbox">
                            <label for="answer-4">5 : 1</label>
                        </li>
                    </ul>
                </fieldset>

                <button type="submit" class="btn--submit-answer">
                    Submit Answer
                </button>   
            </form>


            
        </section>
    </main>

</body>
</html>
